let posMarker = null, posCircle = null, watchId = null, tracking = false;

function haversine(lat1,lon1,lat2,lon2) {
    const R=6371000,d2r=Math.PI/180;
    const dLat=(lat2-lat1)*d2r,dLon=(lon2-lon1)*d2r;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGPS() {
    if(tracking) {
        navigator.geolocation.clearWatch(watchId);
        tracking = false;
        document.getElementById('gps-btn').textContent = '📍 MA POSITION';

        if(posMarker) { posMarker.remove(); posCircle.remove(); posMarker=null; }

    }

        const lat = pos.coords.latitude;

        const acc = Math.round(pos.coords.accuracy);

        }).bindPopup('📍 Vous êtes ici').addTo(map);
        posCircle = L.circle([lat,lon], {
            radius:acc, color:'#00d4ff', fillColor:'#00d4ff', fillOpacity:0.08, weight:1
        }).addTo(map);

        // Point d'eau le plus proche
        const proche = EAU_POINTS
            .map(p => ({...p, d: haversine(lat, lon, p.lat, p.lon)}))
            .sort((a,b) => a.d - b.d)[0];

        document.getElementById('gps-info').textContent = `📍 Précision: ${acc}m`;
        if(proche) {
            const dist = proche.d < 1000 ? Math.round(proche.d)+'m' : (proche.d/1000).toFixed(1)+'km';
            document.getElementById('next-water').textContent =
                `${proche.emoji} Plus proche: ${proche.nom==='—'?proche.type:proche.nom} · ${dist}`;
        }
    }, err => {
        document.getElementById('gps-info').textContent = '❌ ' + err.message;
    }, {enableHighAccuracy:true, timeout:10000, maximumAge:5000});
}
</script>
</body>
</html>
