    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<b style="color:#00d4ff">Légende</b><br><span style="color:#00D4FF">●</span> Eau potable<br><span style="color:#39FF8F">●</span> Fontaine<br><span style="color:#FFD060">●</span> Cimetière<br><span style="color:#FF6B35">●</span> Ravitaillement';
    return div;
};

// ── POSITION EN TEMPS RÉEL ──
let posMarker = null;
let posCircle = null;
let watchId = null;
let tracking = false;

function haversine(lat1,lon1,lat2,lon2) {
    const R=6371000,d2r=Math.PI/180;
    const dLat=(lat2-lat1)*d2r,dLon=(lon2-lon1)*d2r;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function trouverProchainsPoints(lat, lon) {
    // Trier par distance et prendre les 3 plus proches
    const proches = EAU_POINTS
        .map(p => ({...p, dist_m: haversine(lat, lon, p.lat, p.lon)}))
        .sort((a,b) => a.dist_m - b.dist_m)
        .slice(0, 3);
    return proches;
}

function startGPS() {
    if(!navigator.geolocation) {
        document.getElementById('gps-info').textContent = '❌ GPS non disponible';
        return;
    }
    if(tracking) {
        navigator.geolocation.clearWatch(watchId);
        tracking = false;
        document.getElementById('gps-btn').textContent = '📍 MA POSITION';
        document.getElementById('gps-info').textContent = 'GPS inactif';
        document.getElementById('next-water').textContent = '';
        return;
    }
    tracking = true;
    document.getElementById('gps-btn').textContent = '⏹ STOP GPS';
    document.getElementById('gps-info').textContent = '🔄 Acquisition GPS...';

    watchId = navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const acc = Math.round(pos.coords.accuracy);

        // Mettre à jour marqueur position
        if(posMarker) { posMarker.remove(); posCircle.remove(); }
        posMarker = L.circleMarker([lat, lon], {
            radius:10, color:'#ffffff', fillColor:'#00d4ff',
            fillOpacity:1, weight:3
        }).bindPopup('📍 Vous êtes ici').addTo(map);
        posCircle = L.circle([lat, lon], {
            radius:acc, color:'#00d4ff', fillColor:'#00d4ff',
            fillOpacity:0.08, weight:1
        }).addTo(map);

        // Centrer la carte
        map.setView([lat, lon], map.getZoom());

        // Trouver points d'eau proches
        const proches = trouverProchainsPoints(lat, lon);
        document.getElementById('gps-info').textContent = `📍 Précision: ${acc}m`;
        if(proches.length > 0) {
            const p = proches[0];
            const dist = p.dist_m < 1000
                ? Math.round(p.dist_m) + 'm'
                : (p.dist_m/1000).toFixed(1) + 'km';
            document.getElementById('next-water').textContent =
                `${p.emoji} Plus proche: ${p.nom === '—' ? p.type : p.nom} · ${dist}`;
        }
    }, err => {
        document.getElementById('gps-info').textContent = '❌ Erreur GPS: ' + err.message;
    }, {enableHighAccuracy:true, timeout:10000, maximumAge:5000});
}
